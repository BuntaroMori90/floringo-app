  async function seed(){
    const log = document.getElementById('log');
    log.textContent = 'Creo il viaggio-template Giappone...\n';

    const { data: existing } = await sb.from('app_trips').select('id').eq('slug', 'giappone-esempio').maybeSingle();
    if(existing){
      log.textContent += 'Template già esistente. Elimino e ricreo...\n';
      await sb.from('app_trips').delete().eq('id', existing.id);
    }

    const { data: trip, error } = await sb.from('app_trips').insert({
      slug: 'giappone-esempio', nome: 'Giappone 15 giorni (esempio)', editor_password: 'template', is_template: true
    }).select().single();

    if(error){ log.textContent += 'Errore: ' + error.message; return; }

    for(const g of giorni){
      const { data: day } = await sb.from('app_days').insert({
        trip_id: trip.id, numero: g.num, titolo: g.titolo, sottotitolo: g.sub, storia: g.storia,
        luogo: g.luogo, lat: g.lat, lon: g.lon, percorso_maps_url: g.maps,
        must: g.must, bonus: g.bonus, sacrificabili: g.sac,
        meta_guida: g.meta.guida, meta_benzina: g.meta.benzina, meta_cibo: g.meta.cibo,
        trigger_html: g.trigger
      }).select().single();

      const stops = g.schedule.map((s, idx) => ({ day_id: day.id, orario: s[0], nome_tappa: s[1], note: s[2], ordine: idx }));
      await sb.from('app_stops').insert(stops);
      log.textContent += 'Giorno ' + g.num + ' creato con ' + stops.length + ' tappe.\n';
    }

    log.textContent += '\nFatto! Il template "Giappone 15 giorni (esempio)" è ora selezionabile in crea-viaggio.html.';
