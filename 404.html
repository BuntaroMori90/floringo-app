<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Reindirizzamento…</title>
</head>
<body>
<script>
  // Trucco per URL puliti su GitHub Pages (hosting statico, senza regole server-side).
  // Se qualcuno apre /viaggio/nomeviaggio o /editor/nomeviaggio, GitHub serve questo file
  // (perché quel percorso "non esiste" davvero), e qui lo reindirizziamo internamente
  // alla vera pagina con il parametro ?t= che il codice già sa gestire.

  var base = '/floringo-app/'; // cambia qui se in futuro usi un dominio personalizzato (in quel caso: '/')
  var path = window.location.pathname;
  var rest = path.indexOf(base) === 0 ? path.slice(base.length) : path.replace(/^\//, '');
  var parts = rest.split('/').filter(Boolean); // es. ['viaggio', 'islandina-qddx']

  if(parts[0] === 'viaggio' && parts[1]){
    window.location.replace(base + 'viaggio.html?t=' + encodeURIComponent(parts[1]));
  } else if(parts[0] === 'editor' && parts[1]){
    window.location.replace(base + 'editor.html?t=' + encodeURIComponent(parts[1]));
  } else {
    // percorso non riconosciuto: torna alla home
    window.location.replace(base + 'index.html');
  }
</script>
</body>
</html>
