<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il tuo viaggio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --night:#0d0d0d; --night-2:#161616; --ice:#ffffff; --ice-dim:rgba(255,255,255,0.6);
    --accent-1:#f5711a; --accent-2:#ff9a4d; --accent-3:#8a8a8a; --ember:#e8544f; --line:rgba(255,255,255,0.12);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:var(--night); color:var(--ice); font-family:'Space Grotesk',sans-serif; min-height:100vh; }
  header.brand{ display:flex; align-items:center; gap:10px; padding:18px 28px; }
  header.brand img{ height:30px; width:30px; border-radius:50%; }
  header.brand .logo-text{ font-weight:700; font-size:16px; }
  header.brand .logo-text b{ color:var(--accent-1); font-weight:700; }
  .hidden{ display:none !important; }
  #gate{ min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{ width:100%; max-width:420px; background:var(--night-2); border:1px solid var(--line); border-radius:18px; padding:36px 30px; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent-2); margin-bottom:8px; }
  h1{ font-size:28px; font-weight:700; margin-bottom:6px; }
  .sub{ color:var(--ice-dim); font-size:14px; margin-bottom:24px; }
  input{ width:100%; background:var(--night); border:1px solid var(--line); border-radius:10px; padding:13px 15px; color:var(--ice); font-family:'Space Grotesk',sans-serif; font-size:15px; outline:none; }
  button{ width:100%; margin-top:12px; padding:13px; border:none; border-radius:10px; background:linear-gradient(90deg,var(--accent-1),var(--accent-2)); color:var(--night); font-weight:700; font-size:15px; cursor:pointer; font-family:'Space Grotesk',sans-serif; }
  .msg{ font-size:13px; margin-top:12px; color:var(--ember); }

  #app{ max-width:760px; margin:0 auto; padding:30px 20px 80px; }
  .welcome{ font-size:14px; color:var(--ice-dim); }
  .welcome b{ color:var(--ice); }
  .top-row{ display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; margin:6px 0 8px; }
  .countdown .num{ font-family:'JetBrains Mono',monospace; font-size:44px; color:var(--accent-1); line-height:1; }
  .countdown .lbl{ font-size:12px; color:var(--ice-dim); text-transform:uppercase; letter-spacing:0.08em; }
  .section-title{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin:32px 0 12px; display:flex; align-items:center; gap:8px; }
  .section-title::after{ content:""; flex:1; height:1px; background:var(--line); }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ background:rgba(255,255,255,0.06); border:1px solid var(--line); border-radius:100px; padding:7px 14px; font-size:13px; }
  .chip.you{ border-color:var(--accent-1); color:var(--accent-1); }
  .panel{ background:var(--night-2); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }

  .checklist{ list-style:none; font-size:14px; }
  .checklist li{ display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); }
  .checklist li:last-child{ border-bottom:none; }
  .checklist input[type="checkbox"]{ width:18px; height:18px; accent-color:var(--accent-1); cursor:pointer; }
  .checklist label{ flex:1; cursor:pointer; }
  .checklist li.done label{ color:var(--ice-dim); text-decoration:line-through; }
  .del-btn{ background:none; border:1px solid var(--line); color:var(--ice-dim); border-radius:6px; width:22px; height:22px; font-size:12px; cursor:pointer; }
  .del-btn:hover{ border-color:var(--ember); color:var(--ember); }
  .checklist-progress{ font-size:11px; color:var(--ice-dim); margin-top:10px; font-family:'JetBrains Mono',monospace; }
  .add-row{ display:flex; gap:8px; margin-top:14px; }
  .add-row input{ flex:1; padding:10px; font-size:14px; }
  .add-row button{ width:auto; margin-top:0; padding:10px 16px; }

  .note-item{ padding:10px 0; border-bottom:1px solid var(--line); font-size:13.5px; line-height:1.5; }
  .note-item:last-child{ border-bottom:none; }
  .note-item .author{ color:var(--accent-1); font-weight:500; }
  .note-item .ts{ color:var(--ice-dim); font-size:11px; margin-left:6px; }
  textarea{ width:100%; background:var(--night); border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--ice); font-family:'Space Grotesk',sans-serif; font-size:14px; resize:vertical; outline:none; margin-top:10px; }
  .empty{ color:var(--ice-dim); font-size:13px; font-style:italic; }

  .exp-row{ display:flex; justify-content:space-between; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--line); font-size:14px; }
  .exp-row:last-child{ border-bottom:none; }
  .paidby{ font-size:11px; color:var(--ice-dim); }
  .exp-form{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .exp-form input, .exp-form select{ background:var(--night); border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--ice); font-size:14px; outline:none; }
  #expDesc{ flex:2; min-width:140px; } #expAmount{ flex:1; min-width:80px; } #expPaidBy{ flex:1; min-width:120px; }
  .balances-box{ font-size:12.5px; color:var(--ice-dim); margin-top:10px; display:flex; flex-direction:column; gap:4px; }
  .settlements{ margin-top:10px; }
  .settlements .row{ display:flex; justify-content:space-between; padding:6px 0; font-size:13px; border-bottom:1px solid var(--line); }

  .day{ background:var(--night-2); border:1px solid var(--line); border-radius:14px; margin-bottom:10px; overflow:hidden; }
  .day-head{ display:flex; align-items:center; gap:14px; padding:16px 20px; cursor:pointer; }
  .day-num{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent-1); border:1px solid var(--line); border-radius:100px; padding:4px 10px; flex-shrink:0; }
  .day-title{ font-weight:500; font-size:15px; flex:1; }
  .day-sub{ font-size:12px; color:var(--ice-dim); }
  .day-arrow{ color:var(--ice-dim); font-size:12px; transition:transform .2s; }
  .day.open .day-arrow{ transform:rotate(180deg); }
  .day-body{ display:none; padding:0 20px 20px; }
  .day.open .day-body{ display:block; }
  .story{ font-size:13px; color:var(--ice-dim); line-height:1.6; margin-bottom:14px; }
  .day-weather{ display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--ice-dim); background:var(--night); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:16px; }
  .temp{ font-family:'JetBrains Mono',monospace; color:var(--accent-2); font-weight:500; }
  .maps-link{ color:var(--accent-2); text-decoration:none; font-size:12px; margin-left:auto; white-space:nowrap; }
  .schedule{ width:100%; border-collapse:collapse; margin-bottom:14px; }
  .schedule td{ font-size:13px; padding:8px; border-top:1px solid var(--line); vertical-align:top; }
  .schedule td.t{ font-family:'JetBrains Mono',monospace; color:var(--accent-2); font-size:12px; white-space:nowrap; }
  .schedule td.n{ color:var(--ice-dim); font-size:12px; }
  .mbs{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
  .mbs-col .mbs-lbl{ font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; margin-bottom:6px; }
  .mbs-col.must .mbs-lbl{ color:var(--accent-1); } .mbs-col.bonus .mbs-lbl{ color:var(--accent-2); } .mbs-col.sac .mbs-lbl{ color:var(--ember); }
  .mbs-col ul{ list-style:none; font-size:12.5px; }
  .meta-row{ display:flex; flex-wrap:wrap; gap:16px; font-size:12px; color:var(--ice-dim); margin-bottom:12px; }
  .meta-row b{ color:var(--ice); font-weight:500; }
  .trigger{ background:var(--night); border-left:2px solid var(--ember); border-radius:6px; padding:10px 12px; font-size:12.5px; color:var(--ice-dim); line-height:1.6; }

  @media (max-width:480px){ .mbs{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header class="brand">
  <a href="landing.html"><img src="assets/icon-badge.png" alt="FlorinGo"></a>
  <div class="logo-text">Florin<b>Go</b></div>
</header>

<div id="gate">
  <div class="card">
    <div class="eyebrow" id="tripEyebrow">Accesso</div>
    <h1 id="tripName">Caricamento...</h1>
    <div class="sub">Inserisci il tuo nome per entrare.</div>
    <input type="text" id="nameInput" placeholder="Il tuo nome" autocomplete="off">
    <button onclick="checkAccess()">Entra</button>
    <div class="msg" id="gateMsg"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="eyebrow" id="appEyebrow"></div>
  <div class="welcome" id="welcomeMsg"></div>
  <h1 id="appTitle"></h1>

  <div class="top-row" id="countdownRow">
    <div class="countdown"><div class="num" id="daysLeft">--</div><div class="lbl">giorni alla partenza</div></div>
  </div>

  <div class="section-title">Partecipanti</div>
  <div class="chips" id="chipsList"></div>

  <div class="section-title">Checklist personale</div>
  <div class="panel">
    <ul class="checklist" id="packingList"></ul>
    <div class="checklist-progress" id="checklistProgress"></div>
    <div class="add-row">
      <input type="text" id="newChecklistItem" placeholder="Aggiungi una voce...">
      <button onclick="aggiungiVoceChecklist()">+</button>
    </div>
  </div>

  <div class="section-title">Note del gruppo</div>
  <div class="panel">
    <div id="notesList"></div>
    <textarea id="noteInput" placeholder="Scrivi una nota..." rows="2"></textarea>
    <button onclick="inviaNota()" style="margin-top:8px;">Invia</button>
  </div>

  <div class="section-title">Spese di gruppo</div>
  <div class="panel">
    <div id="expensesList"></div>
    <div class="balances-box" id="balancesBox"></div>
    <div class="settlements" id="settlementsBox"></div>
    <div class="exp-form">
      <input type="text" id="expDesc" placeholder="Descrizione">
      <input type="number" id="expAmount" placeholder="€" min="0" step="0.01">
      <select id="expPaidBy"></select>
      <button onclick="aggiungiSpesa()" style="width:auto; margin-top:0;">+</button>
    </div>
  </div>

  <div class="section-title">Itinerario</div>
  <div id="daysContainer"></div>
</div>

<script>
  const sb = window.supabase.createClient(
    'https://wymbqhzszfxcehaptlet.supabase.co',
    'sb_publishable_6FkOsPv4J_sLheV7Oxviow_X3CX6CwN'
  );

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('t');
  let trip = null;

  async function initGate(){
    if(!slug){
      document.getElementById('tripName').textContent = 'Link non valido';
      return;
    }
    const { data, error } = await sb.from('app_trips').select('*').eq('slug', slug).single();
    if(error || !data){
      document.getElementById('tripName').textContent = 'Viaggio non trovato';
      return;
    }
    trip = data;
    document.getElementById('tripName').textContent = trip.nome;
  }
  initGate();

  document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key === 'Enter') checkAccess(); });
  document.getElementById('newChecklistItem').addEventListener('keydown', e => { if(e.key === 'Enter') aggiungiVoceChecklist(); });

  async function checkAccess(){
    if(!trip) return;
    const nome = document.getElementById('nameInput').value.trim();
    if(!nome){ document.getElementById('gateMsg').textContent = 'Inserisci un nome.'; return; }

    let { data: existing } = await sb.from('app_participants').select('*').eq('trip_id', trip.id).ilike('nome', nome);
    let match;
    if(existing && existing.length){
      match = existing[0].nome;
    } else {
      // self-registrazione: chi entra per la prima volta con un nome nuovo viene aggiunto al gruppo
      const { data: created } = await sb.from('app_participants').insert({ trip_id: trip.id, nome }).select().single();
      match = created ? created.nome : nome;
    }

    window.currentUser = match;
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('appEyebrow').textContent = trip.nome;
    document.getElementById('welcomeMsg').innerHTML = 'Bentornato, <b>' + match + '</b>';
    document.getElementById('appTitle').textContent = 'On the road';

    if(trip.data_partenza){
      const oggi = new Date();
      const partenza = new Date(trip.data_partenza);
      const giorni = Math.max(0, Math.ceil((partenza - oggi) / 86400000));
      document.getElementById('daysLeft').textContent = giorni;
    } else {
      document.getElementById('countdownRow').classList.add('hidden');
    }

    caricaPartecipanti(match);
    caricaChecklist(match);
    caricaNote();
    caricaSpese();
    caricaGiorni();
  }

  async function caricaPartecipanti(match){
    const { data } = await sb.from('app_participants').select('*').eq('trip_id', trip.id).order('nome');
    const list = document.getElementById('chipsList');
    list.innerHTML = '';
    (data || []).forEach(p => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (p.nome === match ? ' you' : '');
      chip.textContent = p.nome;
      list.appendChild(chip);
    });
    const select = document.getElementById('expPaidBy');
    select.innerHTML = '';
    (data || []).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.nome; opt.textContent = p.nome;
      if(p.nome === match) opt.selected = true;
      select.appendChild(opt);
    });
    window.tripParticipants = (data || []).map(p => p.nome);
  }

  // ---- Checklist personale ----
  const valigiaDefault = [
    "Documenti, carta di credito, patente",
    "Caricabatterie e batteria esterna",
    "Kit di pronto soccorso personale"
  ];

  async function caricaChecklist(nomeUtente){
    const packingList = document.getElementById('packingList');
    let { data, error } = await sb.from('app_checklist').select('*').eq('trip_id', trip.id).eq('owner', nomeUtente).order('created_at');
    if(error) return;

    if(!data || data.length === 0){
      const seed = valigiaDefault.map(t => ({ trip_id: trip.id, owner: nomeUtente, text: t, is_checked: false, is_custom: false }));
      await sb.from('app_checklist').insert(seed);
      const ricarica = await sb.from('app_checklist').select('*').eq('trip_id', trip.id).eq('owner', nomeUtente).order('created_at');
      data = ricarica.data;
    }

    packingList.innerHTML = '';
    (data || []).forEach(item => {
      const li = document.createElement('li');
      if(item.is_checked) li.classList.add('done');
      li.innerHTML = '<input type="checkbox" ' + (item.is_checked ? 'checked' : '') + '><label>' + item.text + '</label>' +
        (item.is_custom ? '<button class="del-btn">✕</button>' : '');
      li.querySelector('input').addEventListener('change', async function(){
        li.classList.toggle('done', this.checked);
        aggiornaProgressoChecklist();
        await sb.from('app_checklist').update({ is_checked: this.checked }).eq('id', item.id);
      });
      const del = li.querySelector('.del-btn');
      if(del) del.addEventListener('click', async () => {
        if(!confirm('Eliminare questa voce?')) return;
        await sb.from('app_checklist').delete().eq('id', item.id);
        caricaChecklist(nomeUtente);
      });
      packingList.appendChild(li);
    });
    aggiornaProgressoChecklist();
  }

  function aggiornaProgressoChecklist(){
    const totale = document.querySelectorAll('#packingList li').length;
    const fatti = document.querySelectorAll('#packingList li.done').length;
    document.getElementById('checklistProgress').textContent = fatti + ' / ' + totale + ' completati';
  }

  async function aggiungiVoceChecklist(){
    const input = document.getElementById('newChecklistItem');
    const testo = input.value.trim();
    if(!testo) return;
    await sb.from('app_checklist').insert({ trip_id: trip.id, owner: window.currentUser, text: testo, is_checked: false, is_custom: true });
    input.value = '';
    caricaChecklist(window.currentUser);
  }

  // ---- Note ----
  async function caricaNote(){
    const { data } = await sb.from('app_notes').select('*').eq('trip_id', trip.id).order('created_at', { ascending: false });
    const list = document.getElementById('notesList');
    list.innerHTML = '';
    if(!data || data.length === 0){ list.innerHTML = '<div class="empty">Nessuna nota ancora.</div>'; return; }
    data.forEach(n => {
      const item = document.createElement('div');
      item.className = 'note-item';
      const ts = new Date(n.created_at).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      item.innerHTML = '<span class="author">' + n.author_name + '</span><span class="ts">' + ts + '</span>' +
        '<button class="del-btn" style="float:right;">✕</button><br>' + n.content;
      item.querySelector('.del-btn').addEventListener('click', async () => {
        if(!confirm('Eliminare questa nota?')) return;
        await sb.from('app_notes').delete().eq('id', n.id);
        caricaNote();
      });
      list.appendChild(item);
    });
  }

  async function inviaNota(){
    const input = document.getElementById('noteInput');
    const testo = input.value.trim();
    if(!testo) return;
    await sb.from('app_notes').insert({ trip_id: trip.id, author_name: window.currentUser, content: testo });
    input.value = '';
    caricaNote();
  }

  // ---- Spese ----
  async function caricaSpese(){
    const { data: spese } = await sb.from('app_expenses').select('*').eq('trip_id', trip.id).order('created_at', { ascending: false });
    const list = document.getElementById('expensesList');
    list.innerHTML = '';
    if(!spese || spese.length === 0){ list.innerHTML = '<div class="empty">Nessuna spesa registrata.</div>'; }
    else {
      spese.forEach(s => {
        const row = document.createElement('div');
        row.className = 'exp-row';
        row.innerHTML = '<div>' + s.description + '<div class="paidby">pagato da ' + s.paid_by + '</div></div>' +
          '<div style="display:flex;align-items:center;gap:8px;"><div style="font-family:\'JetBrains Mono\',monospace;color:var(--accent-1);">€ ' + Number(s.amount).toFixed(2) + '</div><button class="del-btn">✕</button></div>';
        row.querySelector('.del-btn').addEventListener('click', async () => {
          if(!confirm('Eliminare questa spesa?')) return;
          await sb.from('app_expenses').delete().eq('id', s.id);
          caricaSpese();
        });
        list.appendChild(row);
      });
    }

    const partecipanti = window.tripParticipants || [];
    const balances = {};
    partecipanti.forEach(p => balances[p] = 0);
    let totale = 0;
    (spese || []).forEach(s => { balances[s.paid_by] = (balances[s.paid_by]||0) + Number(s.amount); totale += Number(s.amount); });
    const quota = partecipanti.length ? totale / partecipanti.length : 0;
    partecipanti.forEach(p => balances[p] -= quota);

    document.getElementById('balancesBox').innerHTML = partecipanti.map(p => {
      const v = balances[p]; const segno = v >= 0 ? '+' : '';
      const colore = v >= 0 ? 'var(--accent-1)' : 'var(--ember)';
      return '<div>' + p + ': <b style="color:' + colore + '">' + segno + v.toFixed(2) + ' €</b></div>';
    }).join('');

    const round2 = x => Math.round(x*100)/100;
    const creditori = partecipanti.map(p => ({ nome:p, saldo:round2(balances[p]) })).filter(b=>b.saldo>0.01).sort((a,b)=>b.saldo-a.saldo);
    const debitori = partecipanti.map(p => ({ nome:p, saldo:round2(balances[p]) })).filter(b=>b.saldo<-0.01).sort((a,b)=>a.saldo-b.saldo);
    const trasferimenti = [];
    let i=0,j=0;
    while(i<debitori.length && j<creditori.length){
      const d=debitori[i], c=creditori[j];
      const importo = round2(Math.min(-d.saldo, c.saldo));
      if(importo>0.01) trasferimenti.push({da:d.nome, a:c.nome, importo});
      d.saldo=round2(d.saldo+importo); c.saldo=round2(c.saldo-importo);
      if(Math.abs(d.saldo)<0.02) i++;
      if(Math.abs(c.saldo)<0.02) j++;
    }
    const settlBox = document.getElementById('settlementsBox');
    settlBox.innerHTML = trasferimenti.length === 0 ? '' :
      '<div style="font-size:11px;text-transform:uppercase;color:var(--ice-dim);margin-bottom:6px;font-family:\'JetBrains Mono\',monospace;">Chi deve dare a chi</div>' +
      trasferimenti.map(t => '<div class="row"><span>' + t.da + ' → ' + t.a + '</span><span style="color:var(--accent-2);font-family:\'JetBrains Mono\',monospace;">€ ' + t.importo.toFixed(2) + '</span></div>').join('');
  }

  async function aggiungiSpesa(){
    const desc = document.getElementById('expDesc').value.trim();
    const amount = parseFloat(document.getElementById('expAmount').value);
    const paidBy = document.getElementById('expPaidBy').value;
    if(!desc || !amount || amount<=0) return;
    await sb.from('app_expenses').insert({ trip_id: trip.id, description: desc, amount, paid_by: paidBy });
    document.getElementById('expDesc').value=''; document.getElementById('expAmount').value='';
    caricaSpese();
  }

  // ---- Itinerario ----
  function descriviMeteo(code){
    if(code === 0) return "☀️ Sereno";
    if([1,2,3].includes(code)) return "⛅ Parzialmente nuvoloso";
    if([45,48].includes(code)) return "🌫️ Nebbia";
    if([51,53,55,56,57].includes(code)) return "🌦️ Pioviggine";
    if([61,63,65,66,67,80,81,82].includes(code)) return "🌧️ Pioggia";
    if([71,73,75,77,85,86].includes(code)) return "🌨️ Neve";
    if([95,96,99].includes(code)) return "⛈️ Temporale";
    return "🌡️ Variabile";
  }
  async function getMeteoAttuale(lat, lon){
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
    return (await r.json()).current_weather;
  }
  function linkMaps(nome){ return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(nome); }

  async function caricaGiorni(){
    const { data: days } = await sb.from('app_days').select('*').eq('trip_id', trip.id).order('numero');
    const container = document.getElementById('daysContainer');
    container.innerHTML = '';
    if(!days || days.length === 0){ container.innerHTML = '<div class="panel empty">Itinerario non ancora inserito dall\'organizzatore.</div>'; return; }

    for(const g of days){
      const { data: stops } = await sb.from('app_stops').select('*').eq('day_id', g.id).order('ordine');
      const day = document.createElement('div');
      day.className = 'day';

      const scheduleRows = (stops || []).map(s =>
        '<tr><td class="t">' + (s.orario||'') + '</td><td><a class="act-link" style="color:var(--ice);text-decoration:none;" target="_blank" href="' + linkMaps(s.nome_tappa) + '">' + s.nome_tappa + '</a></td><td class="n">' + (s.note||'') + '</td></tr>'
      ).join('');

      const mbsCol = (label, items, cls) => (!items || !items.length) ? '' :
        '<div class="mbs-col ' + cls + '"><div class="mbs-lbl">' + label + '</div><ul>' + items.map(i=>'<li>'+i+'</li>').join('') + '</ul></div>';
      const mbsHTML = ((g.must&&g.must.length)||(g.bonus&&g.bonus.length)||(g.sacrificabili&&g.sacrificabili.length))
        ? '<div class="mbs">' + mbsCol('Must', g.must, 'must') + mbsCol('Bonus', g.bonus, 'bonus') + mbsCol('Sacrificabili', g.sacrificabili, 'sac') + '</div>' : '';

      const metaHTML = (g.meta_guida || g.meta_benzina || g.meta_cibo)
        ? '<div class="meta-row">' +
          (g.meta_guida ? '<span>Guida: <b>'+g.meta_guida+'</b></span>':'') +
          (g.meta_benzina ? '<span>Benzina: <b>'+g.meta_benzina+'</b></span>':'') +
          (g.meta_cibo ? '<span>Cibo: <b>'+g.meta_cibo+'</b></span>':'') + '</div>' : '';

      const triggerHTML = g.trigger_html ? '<div class="trigger">' + g.trigger_html + '</div>' : '';

      day.innerHTML =
        '<div class="day-head"><div class="day-num">G' + g.numero + '</div>' +
        '<div style="flex:1"><div class="day-title">' + (g.titolo||'') + '</div><div class="day-sub">' + (g.sottotitolo||'') + '</div></div>' +
        '<div class="day-arrow">▾</div></div>' +
        '<div class="day-body">' +
          (g.storia ? '<div class="story">' + g.storia + '</div>' : '') +
          (g.lat && g.lon ? '<div class="day-weather" id="w-'+g.id+'"><span>Meteo a ' + (g.luogo||'') + ': caricamento…</span>' +
            '<a class="maps-link" target="_blank" href="' + linkMaps(g.luogo||'') + '">📍 Maps</a>' +
            (g.percorso_maps_url ? ' <a class="maps-link" target="_blank" href="'+g.percorso_maps_url+'">🗺️ Percorso</a>' : '') + '</div>' : '') +
          (scheduleRows ? '<table class="schedule"><tbody>' + scheduleRows + '</tbody></table>' : '') +
          mbsHTML + metaHTML + triggerHTML +
        '</div>';

      day.querySelector('.day-head').addEventListener('click', () => day.classList.toggle('open'));
      container.appendChild(day);

      if(g.lat && g.lon){
        let loaded = false;
        day.querySelector('.day-head').addEventListener('click', async function(){
          if(day.classList.contains('open') && !loaded){
            loaded = true;
            try{
              const m = await getMeteoAttuale(g.lat, g.lon);
              document.querySelector('#w-'+g.id+' span').innerHTML = descriviMeteo(m.weathercode) + ' — <span class="temp">' + Math.round(m.temperature) + '°C</span>, vento ' + Math.round(m.windspeed) + ' km/h';
            }catch(e){
              document.querySelector('#w-'+g.id+' span').textContent = 'Meteo non disponibile';
            }
          }
        });
      }
    }
    if(container.firstChild) container.firstChild.classList.add('open');
  }
</script>
</body>
